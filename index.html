<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Bracket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pitch:#1a4a2e;--ink:#0f1a14;--ink-m:#1e3328;
  --gold:#c9a84c;--gold-l:#e8c76a;--chalk:#f0ece0;--chalk-d:#9aaa90;
  --green:#27ae60;--red:#c0392b;
}
body{background:var(--pitch);color:var(--chalk);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:80px}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;outline:none}

/* HEADER */
header{background:var(--ink);border-bottom:3px solid var(--gold);padding:22px 16px 16px;text-align:center}
.wc-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold);margin-bottom:2px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,8vw,58px);letter-spacing:2px;line-height:1}
.subtitle{font-size:12px;color:var(--chalk-d);margin-top:6px}

/* NAME BAR */
.name-bar{background:var(--ink-m);border-bottom:1px solid rgba(201,168,76,0.2);padding:12px 16px;display:flex;align-items:center;gap:10;flex-wrap:wrap;gap:10px}
.name-bar label{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap}
.name-bar input{background:transparent;border:none;border-bottom:1.5px solid var(--gold);color:var(--chalk);font-size:15px;padding:3px 6px;flex:1;min-width:160px;outline:none;font-family:'Inter',sans-serif}
.name-bar input::placeholder{color:rgba(240,236,224,0.3)}

/* PHASES */
.phase-nav{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;background:var(--ink-m);border-bottom:1px solid rgba(201,168,76,0.15);padding-bottom:12px}
.phase-btn{font-size:11px;font-weight:600;letter-spacing:1px;padding:6px 12px;border-radius:3px;white-space:nowrap;background:rgba(255,255,255,0.05);color:var(--chalk-d);border:1px solid rgba(255,255,255,0.08);transition:all 0.15s}
.phase-btn.active{background:var(--gold);color:var(--ink)}
.phase-btn.done{background:rgba(39,174,96,0.15);color:var(--green);border-color:rgba(39,174,96,0.3)}

/* PICKS SECTION */
.section{max-width:960px;margin:0 auto;padding:16px 12px}
.pts-badge{font-size:12px;color:var(--chalk-d);margin-bottom:12px}
.pts-badge span{color:var(--gold);font-weight:700}

/* MATCH GRID */
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.match-card{background:var(--ink-m);border:1px solid rgba(201,168,76,0.18);border-radius:6px;overflow:hidden}
.match-head{background:var(--ink);padding:5px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,0.1)}
.match-num{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold)}
.match-body{padding:8px;display:flex;flex-direction:column;gap:6px}
.team-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.18);color:var(--chalk);font-size:14px;font-weight:500;transition:all 0.12s;text-align:left}
.team-btn:disabled{opacity:0.3;cursor:not-allowed}
.team-btn.picked{background:var(--gold);color:var(--ink);font-weight:700;border-color:transparent}
.team-btn .flag{font-size:20px;line-height:1}
.team-btn .name{flex:1}
.next-btn{margin-top:14px;margin-left:auto;display:block;background:var(--gold);color:var(--ink);font-weight:700;font-size:14px;padding:10px 24px;border-radius:4px;letter-spacing:0.5px}

/* FINAL PANEL */
.final-panel{max-width:360px;margin:0 auto}
.final-title{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);margin-bottom:12px}
.final-card{background:var(--ink-m);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:12px;display:flex;flex-direction:column;gap:8px}
.vs{text-align:center;font-size:10px;letter-spacing:3px;color:var(--chalk-d)}
.champion-box{margin-top:20px;text-align:center}
.champion-flag{font-size:48px;margin-bottom:4px}
.champion-name{font-weight:700;font-size:20px;color:var(--gold-l)}
.champion-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--gold);margin-bottom:8px}

/* BRACKET VIEW */
.bracket-wrap{overflow-x:auto;padding:16px 12px}
.bracket{display:flex;gap:0;align-items:stretch;min-width:900px}
.b-round{display:flex;flex-direction:column;flex:1}
.b-round-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold);text-align:center;padding:6px 4px;border-bottom:1px solid rgba(201,168,76,0.15);margin-bottom:4px}
.b-matches{display:flex;flex-direction:column;flex:1;justify-content:space-around;gap:4px;padding:0 4px}
.b-match{background:var(--ink-m);border:1px solid rgba(201,168,76,0.15);border-radius:4px;overflow:hidden;flex:0 0 auto}
.b-team{display:flex;align-items:center;gap:5px;padding:5px 7px;font-size:11px;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.05)}
.b-team:last-child{border-bottom:none}
.b-team.winner{background:var(--gold);color:var(--ink);font-weight:700}
.b-team.tbd{color:var(--chalk-d);font-style:italic;opacity:0.5}
.b-team .b-flag{font-size:13px;line-height:1}
.b-team .b-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CHAMPION BRACKET */
.b-champion{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:0 8px}
.b-champ-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.b-champ-box{background:var(--gold);border-radius:6px;padding:10px 12px;text-align:center;min-width:80px}
.b-champ-flag{font-size:24px}
.b-champ-name{font-size:10px;font-weight:700;color:var(--ink);margin-top:2px}

/* ACTION BUTTONS */
.actions{display:flex;gap:8px;justify-content:center;padding:16px 12px 0;flex-wrap:wrap}
.action-btn{font-size:13px;font-weight:600;padding:10px 22px;border-radius:4px;letter-spacing:0.5px}
.action-primary{background:var(--gold);color:var(--ink)}
.action-secondary{background:rgba(255,255,255,0.07);color:var(--chalk);border:1px solid rgba(255,255,255,0.15)}
.action-btn:disabled{opacity:0.4;cursor:not-allowed}

/* SCREENSHOT MODE — hides UI chrome, shows bracket only */
body.screenshot header .subtitle{display:none}
body.screenshot .name-bar{background:var(--ink);border-bottom:2px solid rgba(201,168,76,0.3)}
body.screenshot .phase-nav{display:none}
body.screenshot .picks-view{display:none!important}
body.screenshot .actions{display:none!important}
body.screenshot .bracket-view{display:block!important}
body.screenshot .screenshot-hint{display:none}

.bracket-view{display:none}
.screenshot-hint{font-size:11px;color:var(--chalk-d);text-align:center;padding:6px;margin-top:4px}

@media(max-width:480px){
  .match-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="wc-label">FIFA World Cup 2026™</div>
  <h1>Bracket Challenge</h1>
  <div class="subtitle">Pick your winners all the way to the champion</div>
</header>

<div class="name-bar">
  <label for="pname">Your Name</label>
  <input type="text" id="pname" placeholder="Enter your name…" oninput="onNameChange(this.value)">
</div>

<div class="phase-nav" id="phaseNav"></div>

<!-- PICKS VIEW -->
<div class="picks-view">
  <div class="section" id="matchArea"></div>
  <div class="actions" id="pickActions"></div>
</div>

<!-- BRACKET VIEW (screenshot mode) -->
<div class="bracket-view" id="bracketView">
  <div class="bracket-wrap">
    <div class="bracket" id="bracketEl"></div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const FLAGS = {
  "South Africa":"🇿🇦","Canada":"🇨🇦","Brazil":"🇧🇷","Japan":"🇯🇵",
  "Germany":"🇩🇪","Paraguay":"🇵🇾","Netherlands":"🇳🇱","Morocco":"🇲🇦",
  "Côte d'Ivoire":"🇨🇮","Norway":"🇳🇴","France":"🇫🇷","Sweden":"🇸🇪",
  "Mexico":"🇲🇽","Ecuador":"🇪🇨","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","DR Congo":"🇨🇩",
  "Belgium":"🇧🇪","Senegal":"🇸🇳","USA":"🇺🇸","Bosnia & Herz.":"🇧🇦",
  "Spain":"🇪🇸","Austria":"🇦🇹","Portugal":"🇵🇹","Croatia":"🇭🇷",
  "Switzerland":"🇨🇭","Algeria":"🇩🇿","Colombia":"🇨🇴","Ghana":"🇬🇭",
  "Australia":"🇦🇺","Egypt":"🇪🇬","Argentina":"🇦🇷","Cabo Verde":"🇨🇻",
};
const f = t => FLAGS[t] || "🏳️";

const R32 = [
  ["South Africa","Canada"],["Brazil","Japan"],["Germany","Paraguay"],["Netherlands","Morocco"],
  ["Côte d'Ivoire","Norway"],["France","Sweden"],["Mexico","Ecuador"],["England","DR Congo"],
  ["Belgium","Senegal"],["USA","Bosnia & Herz."],["Spain","Austria"],["Portugal","Croatia"],
  ["Switzerland","Algeria"],["Colombia","Ghana"],["Australia","Egypt"],["Argentina","Cabo Verde"],
];

const ROUNDS = ["R32","R16","QF","SF","Final"];
const LABELS = {R32:"Round of 32",R16:"Round of 16",QF:"Quarter-Finals",SF:"Semi-Finals",Final:"Final"};
const PTS    = {R32:1,R16:2,QF:4,SF:8,Final:16};

// ── STATE ─────────────────────────────────────────────────────────────────────
let picks = {R32:[],R16:[],QF:[],SF:[],Final:[],Champion:null};
let phase = "R32"; // current editing phase

// ── BRACKET LOGIC ────────────────────────────────────────────────────────────
function slotsFor(round) {
  if (round === "R32") return R32;
  const prev = {R16:"R32",QF:"R16",SF:"QF",Final:"SF"}[round];
  const prevSlots = slotsFor(prev);
  const out = [];
  for (let i = 0; i < prevSlots.length; i += 2) {
    const a = picks[prev][i]   || prevSlots[i][0]   || "?";
    const b = picks[prev][i+1] || prevSlots[i+1][0] || "?";
    out.push([a, b]);
  }
  return out;
}

function roundDone(round) {
  const s = slotsFor(round);
  return s.length > 0 && s.every((_, i) => !!picks[round][i]);
}

function allDone() {
  return ROUNDS.every(r => roundDone(r)) && picks.Champion;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderNav();
  if (phase === "Champion") renderFinal();
  else renderRound(phase);
  renderActions();
}

function renderNav() {
  const nav = document.getElementById("phaseNav");
  nav.innerHTML = "";
  ROUNDS.forEach(r => {
    const done = roundDone(r);
    const active = phase === r;
    const btn = document.createElement("button");
    btn.className = "phase-btn" + (active?" active":done?" done":"");
    btn.textContent = (done && !active ? "✓ " : "") + LABELS[r];
    btn.onclick = () => { phase = r; render(); };
    nav.appendChild(btn);
  });
  // Champion tab
  const btn = document.createElement("button");
  const champDone = !!picks.Champion;
  btn.className = "phase-btn" + (phase==="Champion"?" active":champDone?" done":"");
  btn.textContent = (champDone && phase!=="Champion" ? "✓ " : "") + "Champion";
  btn.onclick = () => { phase = "Champion"; render(); };
  nav.appendChild(btn);
}

function renderRound(round) {
  const slots = slotsFor(round);
  const area = document.getElementById("matchArea");
  area.innerHTML = `<div class="pts-badge">Correct pick = <span>${PTS[round]} pt${PTS[round]>1?"s":""}</span></div><div class="match-grid" id="grid"></div>`;
  const grid = document.getElementById("grid");
  slots.forEach(([a, b], i) => {
    const card = document.createElement("div");
    card.className = "match-card";
    const pickVal = picks[round][i];
    const tbd = a === "?" || b === "?";
    card.innerHTML = `
      <div class="match-head"><span class="match-num">Match ${i+1}</span></div>
      <div class="match-body">
        <button class="team-btn${pickVal===a?" picked":""}" onclick="pick('${round}',${i},'${a.replace(/'/g,"\\'")}',${slots.length})" ${tbd?"disabled":""}>
          <span class="flag">${f(a)}</span><span class="name">${a==="?"?"TBD":a}</span>${pickVal===a?"<span>✓</span>":""}
        </button>
        <button class="team-btn${pickVal===b?" picked":""}" onclick="pick('${round}',${i},'${b.replace(/'/g,"\\'")}',${slots.length})" ${tbd?"disabled":""}>
          <span class="flag">${f(b)}</span><span class="name">${b==="?"?"TBD":b}</span>${pickVal===b?"<span>✓</span>":""}
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

function renderFinal() {
  const finalSlots = slotsFor("Final");
  const [a, b] = finalSlots[0] || ["?","?"];
  const winner = picks.Final[0];
  const champion = picks.Champion;
  const area = document.getElementById("matchArea");
  area.innerHTML = `
    <div class="final-panel">
      <div class="final-title">The Final</div>
      <div class="pts-badge" style="text-align:center;margin-bottom:12px">Correct finalist = <span>16 pts</span> · Correct champion = <span>32 pts</span></div>
      <div class="final-card">
        <button class="team-btn${winner===a?" picked":""}" onclick="pickFinal('${a.replace(/'/g,"\\'")}')">
          <span class="flag">${f(a)}</span><span class="name">${a==="?"?"TBD":a}</span>${winner===a?"<span>✓</span>":""}
        </button>
        <div class="vs">VS</div>
        <button class="team-btn${winner===b?" picked":""}" onclick="pickFinal('${b.replace(/'/g,"\\'")}')">
          <span class="flag">${f(b)}</span><span class="name">${b==="?"?"TBD":b}</span>${winner===b?"<span>✓</span>":""}
        </button>
      </div>
      ${winner ? `
      <div class="champion-box">
        <div class="champion-label">Your Champion</div>
        <div class="champion-flag">${f(winner)}</div>
        <div class="champion-name">${winner}</div>
        <div style="font-size:11px;color:var(--chalk-d);margin-top:4px">+32 pts if correct</div>
      </div>` : ""}
    </div>`;
}

function renderActions() {
  const el = document.getElementById("pickActions");
  el.innerHTML = "";

  if (phase !== "Champion" && roundDone(phase)) {
    const nextIdx = ROUNDS.indexOf(phase) + 1;
    const next = nextIdx < ROUNDS.length ? ROUNDS[nextIdx] : "Champion";
    const nextLabel = next === "Champion" ? "Pick the Champion" : `Next: ${LABELS[next]} →`;
    el.innerHTML += `<button class="action-btn action-primary" onclick="goNext('${next}')">${nextLabel}</button>`;
  }

  if (allDone()) {
    el.innerHTML += `<button class="action-btn action-primary" onclick="showBracket()">📸 View Bracket to Screenshot</button>`;
    el.innerHTML += `<div class="screenshot-hint">Tip: use your browser's "Print → Save as PDF" for best quality</div>`;
  }
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function onNameChange(val) {
  // nothing stored, just live
}

function pick(round, idx, team, total) {
  picks[round][idx] = team;
  // Clear downstream rounds
  const ri = ROUNDS.indexOf(round);
  for (let i = ri+1; i < ROUNDS.length; i++) picks[ROUNDS[i]] = [];
  picks.Champion = null;
  render();
}

function pickFinal(team) {
  picks.Final[0] = team;
  picks.Champion = team;
  render();
}

function goNext(next) {
  phase = next;
  render();
}

// ── BRACKET VIEW ──────────────────────────────────────────────────────────────
function showBracket() {
  renderBracket();
  document.body.classList.add("screenshot");
  window.scrollTo(0,0);
}

function hideBracket() {
  document.body.classList.remove("screenshot");
}

function renderBracket() {
  const name = document.getElementById("pname").value.trim();
  const el = document.getElementById("bracketEl");
  el.innerHTML = "";

  const roundOrder = ["R32","R16","QF","SF","Final"];
  const roundSlots = {};
  roundOrder.forEach(r => { roundSlots[r] = slotsFor(r); });

  roundOrder.forEach(r => {
    const col = document.createElement("div");
    col.className = "b-round";
    col.innerHTML = `<div class="b-round-label">${LABELS[r]}</div>`;
    const matches = document.createElement("div");
    matches.className = "b-matches";
    const slots = roundSlots[r];
    slots.forEach(([a, b], i) => {
      const winner = picks[r][i];
      const div = document.createElement("div");
      div.className = "b-match";
      [a, b].forEach(t => {
        const row = document.createElement("div");
        const isTbd = t === "?";
        row.className = "b-team" + (winner===t?" winner":"") + (isTbd?" tbd":"");
        row.innerHTML = `<span class="b-flag">${isTbd?"":""+f(t)}</span><span class="b-name">${isTbd?"TBD":t}</span>`;
        div.appendChild(row);
      });
      matches.appendChild(div);
    });
    col.appendChild(matches);
    el.appendChild(col);
  });

  // Champion column
  const champCol = document.createElement("div");
  champCol.className = "b-champion";
  const champ = picks.Champion;
  champCol.innerHTML = `
    <div class="b-champ-label">🏆 CHAMPION</div>
    ${champ ? `<div class="b-champ-box"><div class="b-champ-flag">${f(champ)}</div><div class="b-champ-name">${champ}</div></div>` : `<div style="color:var(--chalk-d);font-size:12px">TBD</div>`}
    ${name ? `<div style="margin-top:12px;font-size:10px;color:var(--chalk-d);letter-spacing:1px">${name.toUpperCase()}'S PICKS</div>` : ""}
  `;
  el.appendChild(champCol);

  // Back button inside bracket view
  const back = document.createElement("button");
  back.textContent = "← Back to picks";
  back.className = "action-btn action-secondary";
  back.style.cssText = "position:fixed;bottom:16px;right:16px;z-index:99;font-size:12px;padding:8px 16px;border-radius:4px";
  back.onclick = hideBracket;
  // Remove old back btn if any
  document.querySelectorAll(".back-btn").forEach(b => b.remove());
  back.classList.add("back-btn");
  document.body.appendChild(back);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
ROUNDS.forEach(r => { picks[r] = []; });
render();
</script>
</body>
</html>
