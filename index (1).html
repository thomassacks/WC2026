<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Bracket Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a120d;--ink-m:#132018;--ink-l:#1c2e22;
  --gold:#c9a84c;--gold-l:#e8c76a;--gold-dim:rgba(201,168,76,0.15);
  --chalk:#f0ece0;--chalk-d:#8a9e88;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;
}
html{background:var(--ink);color:var(--chalk);font-family:'Inter',sans-serif}
body{min-height:100vh;padding-bottom:60px}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;outline:none}
input{font-family:'Inter',sans-serif;outline:none}

/* ── HEADER ── */
.header{background:var(--ink);border-bottom:2px solid var(--gold);padding:18px 20px 14px;text-align:center;position:relative}
.header-eyebrow{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:5px;color:var(--gold);margin-bottom:2px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,7vw,54px);letter-spacing:2px;line-height:1}
.header-sub{font-size:11px;color:var(--chalk-d);margin-top:5px;letter-spacing:0.5px}

/* ── TABS ── */
.tabs{display:flex;background:var(--ink-m);border-bottom:1px solid rgba(201,168,76,0.12)}
.tab{flex:1;padding:12px 8px;font-size:12px;font-weight:600;letter-spacing:0.5px;text-align:center;color:var(--chalk-d);background:transparent;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── VIEWS ── */
.view{display:none;animation:fadeIn 0.2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── BRACKET VIEW ── */
.bracket-outer{overflow-x:auto;padding:20px 12px;-webkit-overflow-scrolling:touch}
.bracket{display:flex;gap:0;align-items:flex-start;min-width:820px}
.b-col{display:flex;flex-direction:column;flex:1;min-width:130px}
.b-col-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2.5px;color:var(--gold);text-align:center;padding:6px 4px 8px;border-bottom:1px solid var(--gold-dim);margin-bottom:6px}
.b-matches{display:flex;flex-direction:column;flex:1;gap:0}
.b-spacer{flex:1}

/* Match card in bracket */
.b-match{margin:0 4px;position:relative}
.b-match-inner{background:var(--ink-m);border:1px solid rgba(201,168,76,0.18);border-radius:5px;overflow:hidden;transition:border-color 0.15s}
.b-match-inner:hover{border-color:rgba(201,168,76,0.4)}
.b-team{display:flex;align-items:center;gap:6px;padding:7px 9px;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.12s;border-bottom:1px solid rgba(255,255,255,0.04);position:relative;user-select:none}
.b-team:last-child{border-bottom:none}
.b-team:hover{background:rgba(201,168,76,0.08)}
.b-team.picked{background:var(--gold);color:var(--ink);font-weight:700}
.b-team.tbd{color:var(--chalk-d);opacity:0.45;cursor:default}
.b-team.tbd:hover{background:none}
.b-team .b-flag{font-size:14px;line-height:1;width:18px;text-align:center;flex-shrink:0}
.b-team .b-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b-team .b-check{font-size:9px;opacity:0.8}

/* connector lines */
.b-connector{position:absolute;right:-4px;top:50%;width:4px;height:1px;background:rgba(201,168,76,0.25);z-index:1}

/* champion column */
.b-champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:100px;padding:0 8px}
.b-champ-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:10px}
.b-champ-box{background:linear-gradient(135deg,#1a3a20,#0f1a14);border:1.5px solid var(--gold);border-radius:8px;padding:14px 12px;text-align:center;min-width:90px}
.b-champ-flag{font-size:28px;display:block;margin-bottom:4px}
.b-champ-name{font-size:10px;font-weight:700;color:var(--gold-l)}
.b-champ-trophy{font-size:20px;display:block;margin-bottom:4px;opacity:0.4}

/* ── PICKS PAGE ── */
.picks-page{max-width:500px;margin:0 auto;padding:20px 14px 40px}
.picks-name-row{display:flex;align-items:center;gap:10px;background:var(--ink-m);border:1px solid var(--gold-dim);border-radius:6px;padding:12px 14px;margin-bottom:20px}
.picks-name-label{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap}
.picks-name-input{background:transparent;border:none;border-bottom:1px solid rgba(201,168,76,0.4);color:var(--chalk);font-size:15px;padding:3px 6px;flex:1;min-width:120px}
.picks-name-input::placeholder{color:rgba(240,236,224,0.25)}

.round-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim)}
.pick-match{background:var(--ink-m);border:1px solid rgba(201,168,76,0.14);border-radius:6px;overflow:hidden;margin-bottom:8px}
.pick-match-head{background:var(--ink);padding:4px 12px;display:flex;justify-content:space-between}
.pick-match-num{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold)}
.pick-match-pts{font-size:9px;color:var(--chalk-d)}
.pick-team{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background 0.12s;border-bottom:1px solid rgba(255,255,255,0.04)}
.pick-team:last-child{border-bottom:none}
.pick-team:hover{background:rgba(201,168,76,0.07)}
.pick-team.picked{background:var(--gold);color:var(--ink)}
.pick-team.tbd{opacity:0.3;cursor:not-allowed}
.pick-team .pt-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(201,168,76,0.4);flex-shrink:0;transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.pick-team.picked .pt-radio{background:var(--ink);border-color:var(--ink)}
.pick-team.picked .pt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);display:block}
.pick-team .pt-flag{font-size:18px}
.pick-team .pt-name{flex:1;font-size:13px;font-weight:500}
.pick-team.picked .pt-name{font-weight:700}

.submit-btn{width:100%;margin-top:24px;background:var(--gold);color:var(--ink);font-weight:700;font-size:15px;padding:14px;border-radius:5px;letter-spacing:0.5px;transition:background 0.15s}
.submit-btn:disabled{background:rgba(201,168,76,0.25);color:var(--chalk-d);cursor:not-allowed}
.submit-btn:not(:disabled):hover{background:var(--gold-l)}

.locked-banner{background:rgba(15,50,25,0.8);border:1px solid rgba(46,204,113,0.3);border-radius:6px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.locked-banner-icon{font-size:18px}
.locked-banner-text{font-size:12px;color:var(--green);font-weight:600}
.locked-banner-sub{font-size:11px;color:var(--chalk-d);margin-top:1px}

/* ── LEADERBOARD ── */
.lb-page{max-width:600px;margin:0 auto;padding:20px 14px 40px}
.lb-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.lb-sub{font-size:11px;color:var(--chalk-d);margin-bottom:18px}
.lb-empty{text-align:center;color:var(--chalk-d);margin-top:60px;font-size:14px}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--ink-m);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:12px 16px;margin-bottom:7px;transition:border-color 0.15s}
.lb-row.first{border-color:var(--gold);background:linear-gradient(90deg,rgba(201,168,76,0.08),transparent)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:26px;text-align:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-champ{font-size:11px;color:var(--chalk-d);margin-top:2px}
.lb-score{font-family:'Bebas Neue',sans-serif;font-size:26px}
.lb-pts{font-size:11px;font-family:'Inter',sans-serif;color:var(--chalk-d);margin-left:2px}
.lb-lock{font-size:10px;color:var(--chalk-d);margin-left:4px}

/* ── ADMIN ── */
.admin-page{max-width:700px;margin:0 auto;padding:20px 14px 40px}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.admin-unlock{background:var(--ink-m);border:1px solid var(--gold-dim);border-radius:6px;padding:20px;max-width:320px}
.admin-pw-input{width:100%;background:var(--ink);border:1px solid rgba(201,168,76,0.25);border-radius:4px;color:var(--chalk);font-size:14px;padding:9px 12px;margin:10px 0}
.admin-unlock-btn{width:100%;background:var(--gold);color:var(--ink);font-weight:700;font-size:14px;padding:10px;border-radius:4px}
.admin-round-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--gold);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim)}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.admin-match{background:var(--ink-m);border:1px solid rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
.admin-match-head{background:var(--ink);padding:4px 10px;font-size:10px;color:var(--chalk-d);letter-spacing:1px}
.admin-team{display:flex;align-items:center;gap:7px;padding:8px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.12s}
.admin-team:last-child{border-bottom:none}
.admin-team:hover{background:rgba(255,255,255,0.04)}
.admin-team.winner{background:rgba(46,204,113,0.15);color:var(--green);font-weight:700}
.admin-save-btn{margin-top:18px;background:var(--gold);color:var(--ink);font-weight:700;font-size:14px;padding:11px 28px;border-radius:4px}

/* ── SURPRISE OVERLAY ── */
.surprise-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.surprise-overlay.show{display:flex;animation:fadeIn 0.3s ease}
.surprise-gif{width:240px;border-radius:8px;border:2px solid var(--red);box-shadow:0 0 30px rgba(231,76,60,0.4)}
.surprise-msg{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--green)}
.surprise-sub{font-size:12px;color:var(--chalk-d);text-align:center}
.surprise-close{margin-top:8px;background:var(--gold);color:var(--ink);font-weight:700;padding:10px 28px;border-radius:4px;font-size:13px}

/* scrollbar */
.bracket-outer::-webkit-scrollbar{height:4px}
.bracket-outer::-webkit-scrollbar-track{background:var(--ink)}
.bracket-outer::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">FIFA World Cup 2026™</div>
  <div class="header-title">Bracket Challenge</div>
  <div class="header-sub">Pick your winners · Lock in · Check the board</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bracket')">🗂 Bracket</button>
  <button class="tab" onclick="switchTab('picks')">✏️ My Picks</button>
  <button class="tab" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
  <button class="tab" onclick="switchTab('admin')">⚙️ Admin</button>
</div>

<!-- BRACKET TAB -->
<div id="view-bracket" class="view active">
  <div class="bracket-outer">
    <div class="bracket" id="bracketEl"></div>
  </div>
</div>

<!-- PICKS TAB -->
<div id="view-picks" class="view">
  <div class="picks-page">
    <div class="picks-name-row">
      <label class="picks-name-label">Name</label>
      <input class="picks-name-input" id="nameInput" type="text" placeholder="Your name…" oninput="onNameInput(this.value)">
    </div>
    <div id="lockedBanner" style="display:none" class="locked-banner">
      <span class="locked-banner-icon">🔒</span>
      <div>
        <div class="locked-banner-text">Picks locked in</div>
        <div class="locked-banner-sub">You can view but not change your selections</div>
      </div>
    </div>
    <div id="picksContent"></div>
  </div>
</div>

<!-- LEADERBOARD TAB -->
<div id="view-leaderboard" class="view">
  <div class="lb-page">
    <div class="lb-title">Standings</div>
    <div class="lb-sub">Points: R32=1 · R16=2 · QF=4 · SF=8 · Final=16 · Champion=32</div>
    <div id="lbContent"></div>
  </div>
</div>

<!-- ADMIN TAB -->
<div id="view-admin" class="view">
  <div class="admin-page">
    <div class="admin-title">Enter Results</div>
    <div id="adminContent"></div>
  </div>
</div>

<!-- SURPRISE OVERLAY -->
<div class="surprise-overlay" id="surpriseOverlay">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--chalk-d)">Picks locked 🔒</div>
  <img src="gabriel-arsenal.gif" class="surprise-gif" alt="">
  <div class="surprise-msg">SENT OFF. NO CHANGES.</div>
  <div class="surprise-sub">Good luck... you'll need it</div>
  <button class="surprise-close" onclick="closeSuprise()">Close</button>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const FLAGS = {
  "South Africa":"🇿🇦","Canada":"🇨🇦","Brazil":"🇧🇷","Japan":"🇯🇵",
  "Germany":"🇩🇪","Paraguay":"🇵🇾","Netherlands":"🇳🇱","Morocco":"🇲🇦",
  "Côte d'Ivoire":"🇨🇮","Norway":"🇳🇴","France":"🇫🇷","Sweden":"🇸🇪",
  "Mexico":"🇲🇽","Ecuador":"🇪🇨","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","DR Congo":"🇨🇩",
  "Belgium":"🇧🇪","Senegal":"🇸🇳","USA":"🇺🇸","Bosnia & Herz.":"🇧🇦",
  "Spain":"🇪🇸","Austria":"🇦🇹","Portugal":"🇵🇹","Croatia":"🇭🇷",
  "Switzerland":"🇨🇭","Algeria":"🇩🇿","Colombia":"🇨🇴","Ghana":"🇬🇭",
  "Australia":"🇦🇺","Egypt":"🇪🇬","Argentina":"🇦🇷","Cabo Verde":"🇨🇻",
};
const f = t => FLAGS[t] || "🏳️";

const R32_SLOTS = [
  ["South Africa","Canada"],["Brazil","Japan"],["Germany","Paraguay"],["Netherlands","Morocco"],
  ["Côte d'Ivoire","Norway"],["France","Sweden"],["Mexico","Ecuador"],["England","DR Congo"],
  ["Belgium","Senegal"],["USA","Bosnia & Herz."],["Spain","Austria"],["Portugal","Croatia"],
  ["Switzerland","Algeria"],["Colombia","Ghana"],["Australia","Egypt"],["Argentina","Cabo Verde"],
];

const ROUNDS = ["R32","R16","QF","SF","Final"];
const ROUND_LABELS = {R32:"Round of 32",R16:"Round of 16",QF:"Quarter-Finals",SF:"Semi-Finals",Final:"Final"};
const ROUND_ABBR = {R32:"R32",R16:"R16",QF:"QF",SF:"SF",Final:"Final"};
const POINTS = {R32:1,R16:2,QF:4,SF:8,Final:16,Champion:32};
const ADMIN_PW = "worldcup2026";

// ── STATE ─────────────────────────────────────────────────────────────────────
let myPicks = {R32:[],R16:[],QF:[],SF:[],Final:[],Champion:null};
let myName = "";
let myLocked = false;
let entries = [];   // [{name, picks, submittedAt}]
let results = {R32:[],R16:[],QF:[],SF:[],Final:[]};
let adminUnlocked = false;
let currentTab = "bracket";

// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORE_ENTRIES = "wc2026_entries";
const STORE_RESULTS = "wc2026_results";

function saveEntries() {
  try { localStorage.setItem(STORE_ENTRIES, JSON.stringify(entries)); } catch(e) {}
}
function saveResults() {
  try { localStorage.setItem(STORE_RESULTS, JSON.stringify(results)); } catch(e) {}
}
function loadAll() {
  try { const e = localStorage.getItem(STORE_ENTRIES); if(e) entries = JSON.parse(e); } catch(e) {}
  try { const r = localStorage.getItem(STORE_RESULTS); if(r) results = JSON.parse(r); } catch(e) {}
}

// ── BRACKET LOGIC ────────────────────────────────────────────────────────────
function slotsFor(round, src) {
  // src = picks object to use (myPicks, or entry.picks, or results for admin)
  if (round === "R32") return R32_SLOTS;
  const prev = {R16:"R32",QF:"R16",SF:"QF",Final:"SF"}[round];
  const prevSlots = slotsFor(prev, src);
  const out = [];
  for (let i = 0; i < prevSlots.length; i+=2) {
    const a = src[prev]?.[i]   || prevSlots[i]?.[0]   || null;
    const b = src[prev]?.[i+1] || prevSlots[i+1]?.[0] || null;
    out.push([a,b]);
  }
  return out;
}

function roundComplete(round, src) {
  const s = slotsFor(round, src);
  return s.length > 0 && s.every((_,i) => !!src[round]?.[i]);
}

function allComplete(src) {
  return ROUNDS.every(r => roundComplete(r, src)) && src.Champion;
}

function scoreEntry(entry) {
  let total = 0;
  for (const round of ROUNDS) {
    const ep = entry.picks[round] || [];
    const rr = results[round] || [];
    ep.forEach((p,i) => { if(p && rr[i] && p === rr[i]) total += POINTS[round]; });
  }
  // Champion bonus
  if (entry.picks.Champion && results.Champion && entry.picks.Champion === results.Champion) {
    total += POINTS.Champion;
  }
  return total;
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['bracket','picks','leaderboard','admin'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if (tab === 'bracket') renderBracket();
  if (tab === 'picks') renderPicks();
  if (tab === 'leaderboard') renderLeaderboard();
  if (tab === 'admin') renderAdmin();
}

// ── BRACKET TAB ──────────────────────────────────────────────────────────────
function renderBracket() {
  const el = document.getElementById('bracketEl');
  el.innerHTML = '';

  // Each round gets a column
  // R32=16 matches, R16=8, QF=4, SF=2, Final=1
  const roundMatchCounts = {R32:16,R16:8,QF:4,SF:2,Final:1};
  const maxMatches = 16;

  ROUNDS.forEach(round => {
    const col = document.createElement('div');
    col.className = 'b-col';
    col.innerHTML = `<div class="b-col-label">${ROUND_ABBR[round]}</div>`;

    const matchesWrap = document.createElement('div');
    matchesWrap.className = 'b-matches';
    matchesWrap.style.cssText = 'display:flex;flex-direction:column;gap:0;flex:1';

    const slots = slotsFor(round, myPicks);
    const count = slots.length;
    // spacing: each match occupies (maxMatches/count) units
    const spacing = maxMatches / count;

    slots.forEach(([a,b], i) => {
      const pick = myPicks[round]?.[i] || null;
      // spacer before
      const spacerH = spacing * 0.5;
      const sp = document.createElement('div');
      sp.style.cssText = `flex:${spacerH};min-height:${spacerH * 4}px`;
      matchesWrap.appendChild(sp);

      const matchEl = document.createElement('div');
      matchEl.className = 'b-match';

      const inner = document.createElement('div');
      inner.className = 'b-match-inner';

      [a,b].forEach(team => {
        const row = document.createElement('div');
        const isTbd = !team;
        row.className = 'b-team' + (pick===team&&team?' picked':'') + (isTbd?' tbd':'');
        row.innerHTML = `<span class="b-flag">${isTbd?'':''+f(team)}</span><span class="b-name">${isTbd?'TBD':team}</span>${pick===team&&team?'<span class="b-check">✓</span>':''}`;
        if (!isTbd && !myLocked) {
          row.onclick = () => makePick(round, i, team);
        }
        inner.appendChild(row);
      });

      matchEl.appendChild(inner);
      matchesWrap.appendChild(matchEl);

      // spacer after
      const sp2 = document.createElement('div');
      sp2.style.cssText = `flex:${spacerH};min-height:${spacerH * 4}px`;
      matchesWrap.appendChild(sp2);
    });

    col.appendChild(matchesWrap);
    el.appendChild(col);
  });

  // Champion column
  const champCol = document.createElement('div');
  champCol.className = 'b-champ-col';
  const champ = myPicks.Champion;
  champCol.innerHTML = `
    <div class="b-champ-label">🏆 Champion</div>
    ${champ
      ? `<div class="b-champ-box"><span class="b-champ-flag">${f(champ)}</span><div class="b-champ-name">${champ}</div></div>`
      : `<div class="b-champ-box"><span class="b-champ-trophy">🏆</span><div style="font-size:9px;color:var(--chalk-d)">TBD</div></div>`
    }
    ${myName ? `<div style="margin-top:14px;font-size:9px;color:var(--chalk-d);letter-spacing:1.5px;text-align:center">${myName.toUpperCase()}</div>` : ''}
  `;
  el.appendChild(champCol);
}

// ── PICKS TAB ────────────────────────────────────────────────────────────────
function onNameInput(val) {
  myName = val.trim();
  const existing = entries.find(e => e.name.toLowerCase() === myName.toLowerCase());
  if (existing && !myLocked) {
    myPicks = JSON.parse(JSON.stringify(existing.picks));
    myLocked = true;
  } else if (!existing && myLocked) {
    myLocked = false;
    myPicks = {R32:[],R16:[],QF:[],SF:[],Final:[],Champion:null};
  }
  renderPicks();
}

function makePick(round, idx, team) {
  if (myLocked) return;
  myPicks[round] = myPicks[round] || [];
  myPicks[round][idx] = team;
  // Cascade clear downstream
  const ri = ROUNDS.indexOf(round);
  for (let i = ri+1; i < ROUNDS.length; i++) myPicks[ROUNDS[i]] = [];
  myPicks.Champion = null;
  // Auto-set champion when Final is picked
  if (round === 'Final') myPicks.Champion = team;
  renderPicks();
  if (currentTab === 'bracket') renderBracket();
}

function renderPicks() {
  const banner = document.getElementById('lockedBanner');
  banner.style.display = myLocked ? 'flex' : 'none';

  const nameInput = document.getElementById('nameInput');
  if (nameInput.value !== (myName || '')) nameInput.value = myName || '';
  nameInput.disabled = myLocked;

  const cont = document.getElementById('picksContent');
  cont.innerHTML = '';

  ROUNDS.forEach(round => {
    const slots = slotsFor(round, myPicks);
    const section = document.createElement('div');
    section.style.marginBottom = '20px';
    section.innerHTML = `<div class="round-label">${ROUND_LABELS[round]} <span style="font-size:9px;font-family:'Inter',sans-serif;color:var(--chalk-d);letter-spacing:1px">· ${POINTS[round]} pt${POINTS[round]>1?'s':''} each</span></div>`;

    slots.forEach(([a,b], i) => {
      const pick = myPicks[round]?.[i];
      const tbd = !a && !b;
      const card = document.createElement('div');
      card.className = 'pick-match';
      card.innerHTML = `<div class="pick-match-head"><span class="pick-match-num">Match ${i+1}</span></div>`;
      [a||null, b||null].forEach(team => {
        const row = document.createElement('div');
        row.className = 'pick-team' + (pick===team&&team?' picked':'') + (!team?' tbd':'');
        row.innerHTML = `
          <div class="pt-radio"></div>
          <span class="pt-flag">${team?f(team):'🏳️'}</span>
          <span class="pt-name">${team||'TBD'}</span>`;
        if (team && !myLocked) {
          row.onclick = () => makePick(round, i, team);
        }
        card.appendChild(row);
      });
      section.appendChild(card);
    });
    cont.appendChild(section);
  });

  // Submit button
  const canSubmit = allComplete(myPicks) && myName && !myLocked;
  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.disabled = !canSubmit;
  btn.textContent = myLocked ? '🔒 Picks Locked' : 'Submit & Lock Picks 🔒';
  if (!myLocked) btn.onclick = submitPicks;
  cont.appendChild(btn);
}

function submitPicks() {
  if (!myName) return;
  if (!allComplete(myPicks)) return;
  const entry = {name: myName, picks: JSON.parse(JSON.stringify(myPicks)), submittedAt: Date.now()};
  entries = [...entries.filter(e => e.name.toLowerCase() !== myName.toLowerCase()), entry];
  myLocked = true;
  saveEntries();
  renderPicks();
  // Show surprise
  document.getElementById('surpriseOverlay').classList.add('show');
}

function closeSuprise() {
  document.getElementById('surpriseOverlay').classList.remove('show');
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const cont = document.getElementById('lbContent');
  if (entries.length === 0) {
    cont.innerHTML = '<div class="lb-empty">No picks submitted yet.<br>Share the link with your friends!</div>';
    return;
  }
  const board = [...entries]
    .map(e => ({name:e.name, score:scoreEntry(e), champ:e.picks.Champion}))
    .sort((a,b) => b.score - a.score);

  cont.innerHTML = '';
  board.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i===0?' first':'');
    const rankColor = i===0?'var(--gold)':i===1?'#aaa':i===2?'#cd7f32':'var(--chalk-d)';
    row.innerHTML = `
      <div class="lb-rank" style="color:${rankColor}">${i+1}</div>
      <div class="lb-info">
        <div class="lb-name">${e.name} <span class="lb-lock">🔒</span></div>
        <div class="lb-champ">${e.champ?f(e.champ)+' '+e.champ:'No champion pick'}</div>
      </div>
      <div style="text-align:right">
        <span class="lb-score" style="color:${i===0?'var(--gold)':'var(--chalk)'}">${e.score}</span><span class="lb-pts">pts</span>
      </div>`;
    cont.appendChild(row);
  });
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin() {
  const cont = document.getElementById('adminContent');
  if (!adminUnlocked) {
    cont.innerHTML = `
      <div class="admin-unlock">
        <div style="font-size:13px;color:var(--chalk-d);margin-bottom:8px">Password-protected — only you can enter results.</div>
        <input class="admin-pw-input" type="password" id="adminPw" placeholder="Password…" onkeydown="if(event.key==='Enter')tryUnlock()">
        <button class="admin-unlock-btn" onclick="tryUnlock()">Unlock</button>
        <div style="font-size:10px;color:var(--chalk-d);margin-top:10px">Default: <code style="color:var(--gold)">worldcup2026</code></div>
      </div>`;
    return;
  }

  cont.innerHTML = '<div style="font-size:12px;color:var(--chalk-d);margin-bottom:16px">Click the winning team for each completed match, then save.</div>';

  ROUNDS.forEach(round => {
    // Build slots from actual results
    const adminSrc = {R32:results.R32||[],R16:results.R16||[],QF:results.QF||[],SF:results.SF||[],Final:results.Final||[]};
    let slots;
    if (round === 'R32') {
      slots = R32_SLOTS;
    } else {
      const prev = {R16:'R32',QF:'R16',SF:'QF',Final:'SF'}[round];
      const prevRes = results[prev] || [];
      slots = [];
      for (let i = 0; i < prevRes.length; i+=2) {
        slots.push([prevRes[i]||null, prevRes[i+1]||null]);
      }
    }
    if (slots.length === 0) return;

    const section = document.createElement('div');
    section.innerHTML = `<div class="admin-round-label">${ROUND_LABELS[round]}</div>`;
    const grid = document.createElement('div');
    grid.className = 'admin-grid';

    slots.forEach(([a,b],i) => {
      const winner = results[round]?.[i];
      const card = document.createElement('div');
      card.className = 'admin-match';
      card.innerHTML = `<div class="admin-match-head">Match ${i+1}${winner?` · Winner: ${f(winner)} ${winner}`:''}</div>`;
      [a,b].forEach(team => {
        const row = document.createElement('div');
        row.className = 'admin-team' + (winner===team&&team?' winner':'');
        row.innerHTML = `<span>${team?f(team):'🏳️'}</span><span>${team||'TBD'}</span>${winner===team?'<span style="margin-left:auto;font-size:10px">✓</span>':''}`;
        if (team) row.onclick = () => { setResult(round, i, team); renderAdmin(); };
        card.appendChild(row);
      });
      grid.appendChild(card);
    });

    section.appendChild(grid);
    cont.appendChild(section);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'admin-save-btn';
  saveBtn.textContent = 'Save Results';
  saveBtn.onclick = () => { saveResults(); alert('Results saved!'); };
  cont.appendChild(saveBtn);
}

function tryUnlock() {
  const pw = document.getElementById('adminPw')?.value;
  if (pw === ADMIN_PW) { adminUnlocked = true; renderAdmin(); }
  else alert('Wrong password');
}

function setResult(round, idx, team) {
  results[round] = results[round] || [];
  results[round][idx] = team;
  // Set champion if Final result set
  if (round === 'Final' && idx === 0) results.Champion = team;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadAll();
renderBracket();
</script>
